<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SLV Wildlife Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      width: 240px;
      min-width: 220px;
      min-height: 260px;
      background: rgba(0, 0, 0, 0.88);
      color: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      resize: both;
      overflow: auto;
      cursor: move;
      box-sizing: border-box;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .panel label {
      display: block;
      margin-top: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .panel select,
    .panel textarea,
    .panel button {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 6px;
      padding: 8px;
      margin-top: 4px;
      font-size: 14px;
    }

    .panel textarea {
      resize: vertical;
      min-height: 60px;
    }

    .panel button {
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .panel button:hover {
      opacity: 0.95;
    }

    .legend {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      cursor: default;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #ddd;
      cursor: default;
    }

    @media (max-width: 700px) {
      .panel {
        width: calc(100% - 20px);
        max-width: 320px;
        min-width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <h3>SLV Wildlife Watch</h3>

    <label for="species">Species</label>
    <select id="species">
      <option>Mice</option>
      <option>Rabbits</option>
      <option>Magpies</option>
      <option>Ravens</option>
      <option>Hawks</option>
      <option>Bugs</option>
      <option>Fish</option>
      <option>Crawdads</option>
      <option>Other</option>
    </select>

    <label for="status">Status</label>
    <select id="status">
      <option>Missing</option>
      <option>Less than usual</option>
      <option>Normal</option>
      <option>Boom</option>
    </select>

    <label for="notes">Notes (optional)</label>
    <textarea id="notes" placeholder="Example: Haven’t seen rabbits here in 3 weeks."></textarea>

    <button onclick="enableReport()">Report on Map</button>

    <div class="legend">
      🔴 Missing<br />
      🟠 Less than usual<br />
      🟢 Normal<br />
      🔵 Boom
    </div>

    <div class="status" id="statusMessage">Loading reports...</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const API_BASE = "https://odd-sun-692d.jameskharwood2.workers.dev";

    const map = L.map("map").setView([37.7, -105.9], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let reportMode = false;
    let markerLayer = L.layerGroup().addTo(map);

    function getColor(status) {
      return {
        "Missing": "red",
        "Less than usual": "orange",
        "Normal": "green",
        "Boom": "blue"
      }[status] || "gray";
    }

    function setStatus(message) {
      document.getElementById("statusMessage").textContent = message;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (m) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[m];
      });
    }

    function renderReports(reports) {
      markerLayer.clearLayers();

      reports.forEach((r) => {
        const marker = L.circleMarker([r.lat, r.lng], {
          radius: 8,
          color: getColor(r.status),
          fillColor: getColor(r.status),
          fillOpacity: 0.7,
          weight: 2
        });

        const popupHtml = `
          <b>${escapeHtml(r.species)}</b><br>
          Status: ${escapeHtml(r.status)}<br>
          ${r.notes ? `Notes: ${escapeHtml(r.notes)}<br>` : ""}
          ${r.created_at ? `Reported: ${escapeHtml(r.created_at)}` : ""}
        `;

        marker.bindPopup(popupHtml);
        markerLayer.addLayer(marker);
      });
    }

    async function loadReports() {
      try {
        setStatus("Loading reports...");
        const response = await fetch(`${API_BASE}/reports`);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reports = await response.json();
        renderReports(reports);
        setStatus(`Loaded ${reports.length} report(s).`);
      } catch (error) {
        console.error("Failed to load reports:", error);
        setStatus("Could not load reports.");
      }
    }

    function enableReport() {
      reportMode = true;
      setStatus("Report mode enabled. Click on the map to place your report.");
      alert("Report mode enabled. Click on the map to place your report.");
    }

    async function submitReport(lat, lng) {
      const species = document.getElementById("species").value;
      const status = document.getElementById("status").value;
      const notes = document.getElementById("notes").value.trim();

      const payload = {
        species,
        status,
        lat,
        lng,
        notes
      };

      try {
        setStatus("Submitting report...");

        const response = await fetch(`${API_BASE}/report`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        document.getElementById("notes").value = "";
        reportMode = false;
        setStatus("Report submitted.");
        await loadReports();
      } catch (error) {
        console.error("Failed to submit report:", error);
        setStatus("Failed to submit report.");
        alert("There was a problem submitting the report.");
      }
    }

    map.on("click", async function (e) {
      if (!reportMode) return;
      await submitReport(e.latlng.lat, e.latlng.lng);
    });

    // Draggable panel
    const panel = document.getElementById("panel");
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    panel.addEventListener("mousedown", (e) => {
      const resizeHandleSize = 24;
      const rect = panel.getBoundingClientRect();
      const nearRightEdge = e.clientX > rect.right - resizeHandleSize;
      const nearBottomEdge = e.clientY > rect.bottom - resizeHandleSize;

      // Let the browser handle resizing from the bottom-right corner
      if (nearRightEdge && nearBottomEdge) {
        return;
      }

      // Do not start dragging when interacting with form controls
      const tag = e.target.tagName.toLowerCase();
      if (["select", "textarea", "button", "option"].includes(tag)) {
        return;
      }

      isDragging = true;
      dragOffsetX = e.clientX - panel.offsetLeft;
      dragOffsetY = e.clientY - panel.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      panel.style.left = `${e.clientX - dragOffsetX}px`;
      panel.style.top = `${e.clientY - dragOffsetY}px`;
    });

    document.addEventListener("mouseup", () => {
      isDragging = false;
    });

    loadReports();
  </script>
</body>
</html>
